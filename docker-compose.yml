version: '3.8'

services:
  # --- БАЗЫ ДАННЫХ ---
  postgres:
    image: postgres:15-alpine
    container_name: osint_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - osint_net

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: osint_clickhouse
    restart: always
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
      - CLICKHOUSE_DB=${CH_DATABASE}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - osint_net

  redis:
    image: redis:7-alpine
    container_name: osint_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - osint_net

  # --- МИКРОСЕРВИСЫ ---
  bot:
    build:
      context: ./bot
    container_name: osint_bot_service
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CH_HOST: clickhouse
      CH_PORT: 8123
      CH_USER: default
      CH_PASSWORD: ${CH_PASSWORD}
      CH_DATABASE: ${CH_DATABASE}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SUPER_ADMIN_IDS: ${SUPER_ADMIN_IDS}
      DOCKER_ENV: "true"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - osint_net

# ВАЖНО: Эти блоки стоят без отступов от левого края!
networks:
  osint_net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
