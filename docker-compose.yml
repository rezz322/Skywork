services:
  redis:
    image: redis:alpine
    container_name: osint_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - osint_net

  db-service:
    build:
      context: ./db-service
    container_name: osint_db_service
    restart: always
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - osint_net

  pay-service:
    build:
      context: ./pay-service
    container_name: osint_pay_service
    restart: always
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - osint_net

  bot:
    build:
      context: ./bot
    container_name: osint_bot_service
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      REDIS_URL: redis://redis:6379/0
      DB_SERVICE_URL: http://db-service:8000
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CH_HOST: ${CH_HOST}
      CH_PORT: ${CH_PORT}
      CH_USER: ${CH_USER}
      CH_PASSWORD: ${CH_PASSWORD}
      CH_DATABASE: ${CH_DATABASE}
      DOCKER_ENV: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - db-service
    networks:
      - osint_net

networks:
  osint_net:
    driver: bridge

volumes:
  redis_data:
