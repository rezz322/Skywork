version: '3.8'

services:
  # --- БАЗЫ ДАННЫХ ---
  postgres:
    image: postgres:15-alpine
    container_name: osint_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - osint_net

  redis:
    image: redis:7-alpine
    container_name: osint_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - osint_net

  # --- МИКРОСЕРВИСЫ ---
  db-service:
    build:
      context: ./db-service
    container_name: osint_db_service
    restart: always
    environment:
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - osint_net

  pay-service:
    build:
      context: ./pay-service
    container_name: osint_pay_service
    restart: always
    environment:
      PORT: 8080
      CRYPTO_PAY_TOKEN: ${CRYPTO_PAY_TOKEN}
      IPN_CALLBACK_URL: ${IPN_CALLBACK_URL}
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - osint_net

  bot:
    build:
      context: ./bot
    container_name: osint_bot_service
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      REDIS_URL: redis://redis:6379/0
      DB_SERVICE_URL: http://db-service:8000
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CH_HOST: ${CH_HOST}
      CH_PORT: ${CH_PORT}
      CH_USER: ${CH_USER}
      CH_PASSWORD: ${CH_PASSWORD}
      CH_DATABASE: ${CH_DATABASE}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SUPER_ADMIN_IDS: ${SUPER_ADMIN_IDS}
      DOCKER_ENV: "true"
    depends_on:
      - redis
      - db-service
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - osint_net

# ВАЖНО: Эти блоки стоят без отступов от левого края!
networks:
  osint_net:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
